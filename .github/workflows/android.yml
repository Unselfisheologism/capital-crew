name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: capital-crew-android

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('capital-crew-android/**/*.gradle*', 'capital-crew-android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: capital-crew-android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Build Release AAB
        run: gradle bundleRelease --no-daemon

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: capital-crew-android/app/build/outputs/bundle/release/*.aab
          retention-days: 14
