<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a1e" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Capital Crew</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%;
      height: 100%;
      background: #080818;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      /* Expose safe-area insets as CSS custom properties so Phaser (which
         can't read env() directly) can clear them at HUD Y positions. */
      --cc-safe-top:    env(safe-area-inset-top,    0px);
      --cc-safe-bottom: env(safe-area-inset-bottom, 0px);
      --cc-safe-left:   env(safe-area-inset-left,   0px);
      --cc-safe-right:  env(safe-area-inset-right,  0px);
    }
    body { position: fixed; inset: 0; }
    #game-container { width: 100%; height: 100%; pointer-events: auto; }
    #cc-mobile-controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9990;
      display: none;
    }
    body.is-mobile #cc-mobile-controls { display: block; }
    @media (hover: none) and (pointer: coarse) {
      #cc-mobile-controls { display: block; }
    }
  </style>
</head>
<body class="is-mobile">
  <div id="game-container"></div>
  <div id="cc-mobile-controls"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
